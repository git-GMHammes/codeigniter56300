name: frontend_flutter_v1
description:  "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment: 
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies: 
  flutter_test: 
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

# CONFIGURAÇÃO AQUI FORA - NO NÍVEL RAIZ (sem indentação extra!)
flutter_launcher_icons: 
  android: true
  ios: true
  image_path:  "assets/icon/app_icon.png"
  remove_alpha_ios:  true

flutter:
  uses-material-design:  true
  assets: 
    - assets/icon/